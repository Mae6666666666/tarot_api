<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caine's Tarot Reading</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="stars"></div>

  <main class="container">
    <header>
      <h1>🔮 Caine's Tarot Reading 🔮</h1>
      <p class="tagline">Whisper your question to the stars...</p>
      <button id="logout-btn" class="logout-btn hidden">Sign out</button>
    </header>

    <section id="auth-section" class="panel">
      <div class="auth-tabs">
        <button type="button" id="tab-login" class="auth-tab active">Sign In</button>
        <button type="button" id="tab-signup" class="auth-tab">Sign Up</button>
      </div>
      <label for="email-input">Email</label>
      <input id="email-input" type="email" placeholder="you@example.com" autocomplete="email" />
      <label for="password-input">Password</label>
      <input id="password-input" type="password" placeholder="At least 6 characters" autocomplete="current-password" />
      <button id="auth-btn">Sign In</button>
      <p id="auth-note" class="auth-note hidden">Sign-up is invite-only. Contact the admin if your email isn't on the list.</p>
      <p id="auth-error" class="auth-error"></p>
    </section>

    <section id="reason-section" class="panel hidden">
      <label for="reason-input">Why do you seek a reading today?</label>
      <textarea id="reason-input" rows="3" placeholder="Speak your reason..."></textarea>
      <button id="reason-btn">Begin Reading</button>
    </section>

    <section id="cards-section" class="panel hidden">
      <h2>Your Three Cards</h2>
      <div class="cards">
        <div class="card" data-slot="0">
          <div class="card-inner">
            <div class="card-back">★</div>
            <div class="card-front"></div>
          </div>
          <div class="card-name"></div>
          <div class="card-label">Situation</div>
        </div>
        <div class="card" data-slot="1">
          <div class="card-inner">
            <div class="card-back">★</div>
            <div class="card-front"></div>
          </div>
          <div class="card-name"></div>
          <div class="card-label">Challenge</div>
        </div>
        <div class="card" data-slot="2">
          <div class="card-inner">
            <div class="card-back">★</div>
            <div class="card-front"></div>
          </div>
          <div class="card-name"></div>
          <div class="card-label">Outcome</div>
        </div>
      </div>
      <button id="draw-btn">Draw Card</button>
    </section>

    <section id="overview-section" class="panel hidden">
      <button id="overview-btn">Reveal Interpretation</button>
      <pre id="overview-text" class="overview"></pre>
    </section>

    <p id="status" class="status"></p>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
